services:
  server:
    build:
      context: ./server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - PORT=3001
    volumes:
      - recipe-data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_ENDPOINT: http://localhost:3001
    ports:
      - "5173:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  recipe-data:
